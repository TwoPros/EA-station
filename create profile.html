<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Create Profile - EA Station</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0a0e21 0%, #1a1f3a 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 450px;
            margin: 0 auto;
        }

        .card {
            background: rgba(15, 18, 37, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px 25px;
            border: 1px solid rgba(0, 212, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 50px;
            margin-bottom: 10px;
        }

        h1 {
            color: white;
            font-size: 28px;
            font-weight: bold;
        }

        h1 span {
            color: #00d4ff;
        }

        .subtitle {
            color: #8890b0;
            font-size: 13px;
            margin-top: 5px;
        }

        /* Profile Image Section */
        .profile-image-section {
            text-align: center;
            margin-bottom: 25px;
        }

        .avatar-circle {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #1a1f3a, #141834);
            border-radius: 60px;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #00d4ff;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: all 0.3s;
        }

        .avatar-circle:hover {
            transform: scale(1.02);
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .avatar-placeholder {
            font-size: 50px;
            color: #556080;
        }

        .avatar-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .upload-label {
            background: rgba(0, 212, 255, 0.2);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            color: #00d4ff;
            cursor: pointer;
            display: inline-block;
            transition: all 0.3s;
        }

        .upload-label:hover {
            background: rgba(0, 212, 255, 0.3);
        }

        input[type="file"] {
            display: none;
        }

        /* Form Groups */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #b0b5d0;
            font-size: 13px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        label i {
            margin-right: 8px;
        }

        .required {
            color: #ff6b6b;
            margin-left: 4px;
        }

        input {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            color: white;
            font-size: 15px;
            transition: all 0.3s;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #00d4ff;
            background: rgba(255, 255, 255, 0.12);
        }

        input:read-only {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .error-message {
            color: #ff6b6b;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .success-message {
            color: #00ff88;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .info-message {
            background: rgba(0, 212, 255, 0.1);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #00d4ff;
            text-align: center;
        }

        .done-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .done-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 212, 255, 0.3);
        }

        .done-btn:active {
            transform: translateY(0);
        }

        .done-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }


    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="logo">👤</div>
                <h1>Create <span>Profile</span></h1>
                <div class="subtitle">Complete your profile to continue</div>
            </div>

            <div class="info-message" id="infoMessage">
                ⚡ Please complete your profile information
            </div>

            <!-- Profile Image -->
            <div class="profile-image-section">
                <div class="avatar-circle" id="avatarCircle" onclick="document.getElementById('file').click()">
                    <div class="avatar-placeholder" id="avatarPlaceholder">📷</div>
                    <img class="avatar-image" id="avatarImage" style="display: none;">
                </div>
                <label class="upload-label" onclick="document.getElementById('file').click()">
                    📸 Upload Profile Picture
                </label>
                <input id="file" type="file" accept="image/*">
                <div id="imageError" class="error-message"></div>
            </div>

            <!-- Form Fields -->
            <div class="form-group">
                <label><i>👤</i> Full Name <span class="required">*</span></label>
                <input id="name" type="text">
            </div>            

            <div class="form-group">
                <label><i>📞</i> Phone Number <span class="required">*</span></label>
                <input id="phone-number" type="tel" placeholder="e.g., 0912345678">
                <div id="phoneError" class="error-message"></div>
            </div>

            <button class="done-btn" id="doneBtn" onclick="finish()">Complete Profile →</button>

        </div>
    </div>
    <div id="loader" style="
    position: fixed;
    top:0;left:0;
    width:100%;height:100%;
    background: rgba(10,14,33,0.95);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:9999;
    color:white;
    font-size:20px;
">
    ⏳ Processing...
</div>
hh
    <script type="module">
        
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, set, get, update } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";


        const firebaseConfig = {
            apiKey: "AIzaSyBW1nFDfogr_V3uAsrMPjx1tDULl7URgZQ",
            authDomain: "ea-station.firebaseapp.com",
            databaseURL: "https://ea-station-default-rtdb.firebaseio.com",
            projectId: "ea-station",
            storageBucket: "ea-station.firebasestorage.app",
            messagingSenderId: "493379253444",
            appId: "1:493379253444:web:6319c915469b0359040591",
            measurementId: "G-X670BF4H52"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        function showLoader() {
            document.getElementById("loader").style.display = "flex";
        }

        function hideLoader() {
            document.getElementById("loader").style.display = "none";
        }

        let User = JSON.parse(localStorage.getItem("User"));
        const { uid: UserId } = User;        

        const UserRef = ref(database, `EA station/users/${UserId}`);

        let selectedFile = null;
        let uploadedImageUrl = "";
        let isUploading = false;

        async function uploadToServer(file) {
            if (!file) throw new Error("No file selected");

            const reader = new FileReader();

            return new Promise((resolve, reject) => {
                reader.onload = async () => {
                    const base64 = reader.result;

                    try {
                       const response = await fetch("/api/upload", {
                           method: "POST",
                           headers: {
                              "Content-Type": "application/json"
                           },
                           body: JSON.stringify({
                              name: `${UserId}.jpg`,
                              type: file.type,
                              content: base64
                           })
                       });

                       const data = await response.json();
                       console.log("UPLOAD RESPONSE:", data);

                       if (!response.ok) {
                          reject(data.error || "Upload failed");
                          document.getElementById("imageError").textContent = data.error;
                          return;
                       }

                       uploadedImageUrl = data.url;  
                       resolve(data); // ✅ return result                                                
                   } catch (error) {
                       document.getElementById("imageError").textContent = error;
                       reject(error);
                   }
               };

               reader.onerror = () => reject("File read error");                 
               reader.readAsDataURL(file);
           });
       }

        // Update database
        async function insertDB() {
            const EleName = document.getElementById("name").value;
            const ElePhoneNumber = document.getElementById("phone-number").value;            

            try {
                await update(UserRef, {
                    name: EleName,
                    photo: uploadedImageUrl.url,
                    phoneNumber: ElePhoneNumber
                                                      
                });

                User.name = EleName;
                User.photo = uploadedImageUrl.url;
           localStorage.setItem("User", JSON.stringify(User));
 document.getElementById("infoMessage").innerHTML = "✅ Profile created successfully! Redirecting...";
                document.getElementById("infoMessage").style.background = "rgba(0,255,136,0.1)";
                document.getElementById("infoMessage").style.color = "#00ff88";
           localStorage.setItem("EA_StationIsLogined","true")

                setTimeout(() => {
                    window.location.href = "home.html";
                }, 1500);
            } catch (error) {
                document.getElementById("infoMessage").innerHTML = "❌ Error: " + error.message;
                document.getElementById("infoMessage").style.background = "rgba(255,107,107,0.1)";
                document.getElementById("infoMessage").style.color = "#ff6b6b";
            }
        }

        // Validation
        function validateForm() {
            let isValid = true;

            const phone = document.getElementById("phone-number").value;
            const phoneError = document.getElementById("phoneError");
            if (phone && (!/^[0-9]{10,12}$/.test(phone.replace(/\D/g, '')))) {
                phoneError.textContent = "Enter a valid phone number (10-12 digits)";
                phoneError.style.display = "block";
                isValid = false;
            } else {
                phoneError.style.display = "none";
            }

            return isValid && !isUploading;
        }

        function checkFormValidity() {
            const isValid = validateForm();
            const doneBtn = document.getElementById("doneBtn");
            doneBtn.disabled = !isValid;
        }

        async function finish() {
           if (!validateForm()) return;

           showLoader(); // 👈 block UI

           try {
              if (selectedFile) {
                 uploadedImageUrl = await uploadToServer(selectedFile);
              }

              await insertDB();

           } catch (err) {
              console.error(err);
           }

           hideLoader();
       }

        // Event listeners
       document.getElementById("file").addEventListener("change", (e) => {
           const file = e.target.files[0];

           if (!file) return;

           selectedFile = file;

           // preview only
           const reader = new FileReader();
           reader.onload = (ev) => {
              document.getElementById("avatarPlaceholder").style.display = "none";
              const img = document.getElementById("avatarImage");
              img.src = ev.target.result;
              img.style.display = "block";
           };

           reader.readAsDataURL(file);

      });

        document.getElementById("phone-number").addEventListener("input", checkFormValidity);
        

        window.finish = finish;

    </script>
</body>
</html>
