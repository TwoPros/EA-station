<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Profile</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial;
    }

    body{
        background:#0f172a;
        color:white;
        padding:20px;
    }

    .container{
        max-width:450px;
        margin:auto;
        background:#1e293b;
        padding:20px;
        border-radius:20px;
    }

    h1{
        margin-bottom:20px;
        text-align:center;
    }

    .profile{
        display:flex;
        flex-direction:column;
        align-items:center;
        margin-bottom:20px;
    }

    .profile img{
        width:120px;
        height:120px;
        border-radius:50%;
        object-fit:cover;
        border:3px solid #00d4ff;
        margin-bottom:10px;
    }

    input{
        width:100%;
        padding:14px;
        border:none;
        outline:none;
        margin-top:15px;
        border-radius:10px;
        background:#334155;
        color:white;
    }

    button{
        width:100%;
        padding:15px;
        border:none;
        border-radius:10px;
        margin-top:20px;
        background:#00d4ff;
        color:white;
        font-size:17px;
        font-weight:bold;
    }

    #status{
        margin-top:15px;
        text-align:center;
    }

    .loader{
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;
        background:rgba(0,0,0,0.7);
        display:none;
        align-items:center;
        justify-content:center;
        z-index:999;
        font-size:25px;
    }
</style>
</head>
<body>

<div class="container">

    <h1>Edit Profile</h1>

    <div class="profile">
        <img id="profileImage" src="https://via.placeholder.com/120">

        <input type="file" id="file" accept="image/*">
    </div>

    <input type="text" id="name" placeholder="Full Name">

    <input type="text" id="carType" placeholder="Car Type">

    <input type="text" id="phone" placeholder="Phone Number">

    <button id="saveBtn">Save Changes</button>

    <div id="status"></div>

</div>

<div class="loader" id="loader">
    Uploading...
</div>

<script type="module">

/* =========================
   FIREBASE IMPORTS
========================= */

import { initializeApp }
from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";

import {
    getDatabase,
    ref,
    get,
    update
}
from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";


/* =========================
   FIREBASE CONFIG
========================= */

const firebaseConfig = {
    apiKey: "AIzaSyBW1nFDfogr_V3uAsrMPjx1tDULl7URgZQ",
    authDomain: "ea-station.firebaseapp.com",
    databaseURL: "https://ea-station-default-rtdb.firebaseio.com",
    projectId: "ea-station",
    storageBucket: "ea-station.firebasestorage.app",
    messagingSenderId: "493379253444",
    appId: "1:493379253444:web:6319c915469b0359040591"
};


/* =========================
   INITIALIZE FIREBASE
========================= */

const app = initializeApp(firebaseConfig);

const database = getDatabase(app);


/* =========================
   GET USER FROM LOCALSTORAGE
========================= */

const User = JSON.parse(localStorage.getItem("User"));

if(!User){
    alert("No user found");
    throw new Error("User missing");
}

const UserId = User.uid;


/* =========================
   DATABASE LOCATION
========================= */

const UserRef = ref(database, `EA station/users/${UserId}`);


/* =========================
   GLOBAL VARIABLES
========================= */

let selectedFile = null;

let uploadedImageUrl = "";



/* =========================
   HTML ELEMENTS
========================= */

const profileImage = document.getElementById("profileImage");

const fileInput = document.getElementById("file");

const nameInput = document.getElementById("name");

const carTypeInput = document.getElementById("carType");

const phoneInput = document.getElementById("phone");

const statusDiv = document.getElementById("status");

const loader = document.getElementById("loader");


/* =========================
   SHOW / HIDE LOADER
========================= */

function showLoader(){
    loader.style.display = "flex";
}

function hideLoader(){
    loader.style.display = "none";
}



/* =========================
   LOAD USER DATA
========================= */

async function loadProfile(){

    try{

        const snapshot = await get(UserRef);

        if(!snapshot.exists()){
            alert("Profile not found");
            return;
        }

        const data = snapshot.val();

        console.log(data);

        // fill inputs
        nameInput.value = data.name || "";

        carTypeInput.value = data.carType || "";

        phoneInput.value = data.phoneNumber || "";

        // set profile image
        if(data.photo){
            profileImage.src = data.photo;
        }

    }catch(error){

        console.log(error);

        statusDiv.innerHTML = error.message;

    }

}


/* =========================
   IMAGE PREVIEW
========================= */

fileInput.addEventListener("change", (e)=>{

    const file = e.target.files[0];

    if(!file) return;

    // validation
    if(file.size > 2 * 1024 * 1024){

        alert("Image too large");

        return;
    }

    if(!file.type.startsWith("image/")){

        alert("Only image allowed");

        return;
    }

    selectedFile = file;

    // preview image

    const reader = new FileReader();

    reader.onload = (ev)=>{

        profileImage.src = ev.target.result;

    };

    reader.readAsDataURL(file);

});



/* =========================
   UPLOAD IMAGE TO SERVER
========================= */

async function uploadToServer(file){

    const reader = new FileReader();

    return new Promise((resolve, reject)=>{

        reader.onload = async ()=>{

            try{

                const response = await fetch("/api/upload", {

                    method:"POST",

                    headers:{
                        "Content-Type":"application/json"
                    },

                    body:JSON.stringify({

                        name:`${UserId}.jpg`,

                        type:file.type,

                        content:reader.result

                    })

                });

                const data = await response.json();

                if(!response.ok){

                    reject(data.error);

                    return;
                }

                resolve(data.url);

            }catch(error){

                reject(error);

            }

        };

        reader.onerror = ()=>{

            reject("File read failed");

        };

        reader.readAsDataURL(file);

    });

}



/* =========================
   SAVE PROFILE
========================= */

async function saveProfile(){

    try{

        showLoader();

        statusDiv.innerHTML = "";

        let finalPhotoUrl = profileImage.src;

        /*
            IF USER CHANGED IMAGE
            -> upload new image
        */

        if(selectedFile){

            finalPhotoUrl = await uploadToServer(selectedFile);

        }


        /*
            UPDATE DATABASE
        */

        await update(UserRef, {

            name:nameInput.value,

            carType:carTypeInput.value,

            phoneNumber:phoneInput.value,

            photo:finalPhotoUrl

        });


        /*
            UPDATE LOCALSTORAGE
        */

        User.name = nameInput.value;

        User.photo = finalPhotoUrl;

        localStorage.setItem("User", JSON.stringify(User));


        statusDiv.innerHTML = "✅ Profile Updated";

    }catch(error){

        console.log(error);

        statusDiv.innerHTML = "❌ " + error;

    }

    hideLoader();

}



/* =========================
   BUTTON EVENT
========================= */

document.getElementById("saveBtn")
.addEventListener("click", saveProfile);



/* =========================
   START
========================= */

loadProfile();

</script>

</body>
</html>
