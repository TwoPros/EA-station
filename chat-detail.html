<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Chat with Station - EA Station Driver</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0a0e21 0%, #1a1f3a 100%);
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            max-width: 450px;
            margin: 0 auto;
            background: #0f1225;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #0a0e21 0%, #12152b 100%);
            padding: 20px;
            border-bottom: 1px solid rgba(0, 212, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.08);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 20px;
            color: #00d4ff;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: rgba(0, 212, 255, 0.2);
        }

        .station-info {
            flex: 1;
        }

        .station-name {
            color: white;
            font-size: 18px;
            font-weight: bold;
        }

        .station-address {
            color: #8890b0;
            font-size: 11px;
            margin-top: 3px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .station-fuel {
            color: #00d4ff;
            font-size: 11px;
            margin-top: 2px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .station-avatar {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border-radius: 23px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        /* Chat Box */
        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Scrollbar */
        .chat-box::-webkit-scrollbar {
            width: 4px;
        }

        .chat-box::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        .chat-box::-webkit-scrollbar-thumb {
            background: #00d4ff;
            border-radius: 4px;
        }

        /* Message Bubbles */
        .message {
            max-width: 75%;
            padding: 12px 15px;
            border-radius: 20px;
            position: relative;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .sent {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }

        .received {
            background: rgba(255, 255, 255, 0.08);
            color: white;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }

        .message-text {
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message-meta {
            font-size: 10px;
            margin-top: 5px;
            display: flex;
            justify-content: flex-end;
            gap: 5px;
            opacity: 0.7;
        }

        .sent .message-meta {
            color: rgba(255, 255, 255, 0.8);
        }

        .received .message-meta {
            color: #8890b0;
        }

        /* Input Box */
        .input-box {
            background: rgba(15, 18, 37, 0.95);
            backdrop-filter: blur(20px);
            padding: 15px 20px;
            display: flex;
            gap: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-box input {
            flex: 1;
            padding: 12px 18px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 25px;
            color: white;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.3s;
        }

        .input-box input:focus {
            outline: none;
            border-color: #00d4ff;
            background: rgba(255, 255, 255, 0.12);
        }

        .input-box input::placeholder {
            color: #556080;
        }

        .send-btn {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border: none;
            border-radius: 23px;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover {
            transform: scale(1.05);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        /* Empty State */
        .empty-chat {
            text-align: center;
            padding: 60px 20px;
            color: #556080;
        }

        .empty-icon {
            font-size: 50px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        /* Fuel Price Badge */
        .fuel-price {
            background: rgba(0, 212, 255, 0.15);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            color: #00d4ff;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <button class="back-btn" onclick="window.location.href = 'message.html'">←</button>
            <div class="station-avatar" id="stationAvatar">⛽</div>
            <div class="station-info">
                <div class="station-name" id="stationName">Loading...</div>
                <div class="station-address" id="stationLocation">
                    📍 Loading location...
                </div>
                <div class="station-fuel" id="stationFuel">
                    ⛽ Loading fuel...
                </div>
            </div>
        </div>

        <div class="chat-box" id="chatBox">
            <div class="empty-chat">
                <div class="empty-icon">💬</div>
                <div>No messages yet</div>
                <div style="font-size: 12px; margin-top: 8px;">Start the conversation</div>
            </div>
        </div>

        <div class="input-box">
            <input id="messageInput" placeholder="Type a message..." autocomplete="off">
            <button class="send-btn" id="sendBtn">📤</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, get, update } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBW1nFDfogr_V3uAsrMPjx1tDULl7URgZQ",
            authDomain: "ea-station.firebaseapp.com",
            databaseURL: "https://ea-station-default-rtdb.firebaseio.com",
            projectId: "ea-station",
            storageBucket: "ea-station.firebasestorage.app",
            messagingSenderId: "493379253444",
            appId: "1:493379253444:web:6319c915469b0359040591",
            measurementId: "G-X670BF4H52"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const params = new URLSearchParams(window.location.search);
        const stationId = params.get("stationId");
        const driverId = params.get("driverId") || localStorage.getItem("userId");

        // Get current user (driver)
        const currentUserId = driverId;
        
        const convo1 = `${stationId}-WITH-${currentUserId}`;
        const convo2 = `${currentUserId}-WITH-${stationId}`;

        let activeConvoId;
        let messagesRef;

        const chatBox = document.getElementById("chatBox");
        const input = document.getElementById("messageInput");
        const sendBtn = document.getElementById("sendBtn");
        const stationNameEl = document.getElementById("stationName");
        const stationLocationEl = document.getElementById("stationLocation");
        const stationFuelEl = document.getElementById("stationFuel");
        const stationAvatarEl = document.getElementById("stationAvatar");

        // Load station information from Firebase
        async function loadStationInfo() {
            // Get station basic info
            const stationSnapshot = await get(ref(db, `EA station/stations/${stationId}`));
            if (stationSnapshot.exists()) {
                const stationData = stationSnapshot.val();
                stationNameEl.textContent = stationData.name || "Station";
                stationLocationEl.innerHTML = `📍 ${stationData.location || "Location not available"}`;
                stationFuelEl.innerHTML = `⛽ Fuel: ${stationData.fuelLeft || 0}L available • ${stationData.fuelprice || 0} ETB/L`;
                
                // Add fuel price badge
                const fuelPriceSpan = document.createElement("span");
                fuelPriceSpan.className = "fuel-price";
                stationAvatarEl.textContent = "⛽";
            }
            
            // Get station information (owner details)
            const infoSnapshot = await get(ref(db, `EA station/users/${stationId}/Information`));
            if (infoSnapshot.exists()) {
                const infoData = infoSnapshot.val();
                // You can use this data if needed
                console.log("Station info:", infoData);
            }
        }

        // Initialize chat
        async function initChat() {
            const snap1 = await get(ref(db, `EA station/messages/${convo1}`));
            const snap2 = await get(ref(db, `EA station/messages/${convo2}`));

            if (snap1.exists()) activeConvoId = convo1;
            else if (snap2.exists()) activeConvoId = convo2;
            else activeConvoId = convo1;

            messagesRef = ref(db, `EA station/messages/${activeConvoId}`);
            listenMessages();
        }

        // Listen for messages
        function listenMessages() {
            onValue(messagesRef, (snapshot) => {
                const data = snapshot.val();
                chatBox.innerHTML = "";

                if (!data) {
                    chatBox.innerHTML = `
                        <div class="empty-chat">
                            <div class="empty-icon">💬</div>
                            <div>No messages yet</div>
                            <div style="font-size: 12px; margin-top: 8px;">Start the conversation</div>
                        </div>
                    `;
                    return;
                }

                const messages = Object.entries(data)
                    .map(([id, val]) => ({ id, ...val }))
                    .sort((a, b) => a.time - b.time);

                messages.forEach(msg => {
                    const div = document.createElement("div");
                    div.classList.add("message");

                    // isMe = current user (driver) is the sender
                    const isMe = msg.from === currentUserId;

                    if (isMe) div.classList.add("sent");
                    else div.classList.add("received");

                    const time = new Date(msg.time).toLocaleTimeString([], {
                        hour: "2-digit",
                        minute: "2-digit"
                    });

                    // Auto mark as seen (if message is from station and not seen)
                    if (!isMe && !msg.seen) {
                        update(ref(db, `EA station/messages/${activeConvoId}/${msg.id}`), {
                            seen: true
                        });
                    }

                    let seenMark = "";
                    if (isMe) {
                        seenMark = msg.seen ? "✔✔" : "✔";
                    }

                    div.innerHTML = `
                        <div class="message-text">${escapeHtml(msg.message)}</div>
                        <div class="message-meta">
                            ${time} ${seenMark}
                        </div>
                    `;

                    chatBox.appendChild(div);
                });

                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text;
            return div.innerHTML;
        }

        // Send message (sender is current user = driver)
        function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            push(messagesRef, {
                from: currentUserId,
                to: stationId,
                message: text,
                time: Date.now(),
                seen: false
            });

            input.value = "";
        }

        // Event listeners
        sendBtn.addEventListener("click", sendMessage);
        input.addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
        });

        // Initialize
        loadStationInfo();
        initChat();
    </script>
</body>
</html>
