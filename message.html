<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Messages - EA Station</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0a0e21 0%, #1a1f3a 100%);
            min-height: 100vh;
        }

        .app-container {
            max-width: 450px;
            margin: 0 auto;
            background: #0f1225;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #0a0e21 0%, #12152b 100%);
            padding: 20px;
            border-bottom: 1px solid rgba(0, 212, 255, 0.1);
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.08);
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            color: #00d4ff;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 15px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        h1 {
            color: white;
            font-size: 28px;
            font-weight: bold;
        }

        h1 span {
            color: #00d4ff;
        }

        .subtitle {
            color: #8890b0;
            font-size: 13px;
            margin-top: 5px;
        }

        /* Search Bar */
        .search-bar {
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .search-input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            color: white;
            font-size: 14px;
            transition: all 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: #00d4ff;
            background: rgba(255, 255, 255, 0.12);
        }

        .search-input::placeholder {
            color: #556080;
        }

        /* Station List */
        .station-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 15px 20px;
        }

        .section-title {
            color: #8890b0;
            font-size: 12px;
            margin: 15px 0 10px 5px;
            letter-spacing: 1px;
        }

        .station-card {
            background: linear-gradient(135deg, #1a1f3a, #141834);
            border-radius: 18px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(0, 212, 255, 0.15);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .station-card:hover {
            transform: translateX(5px);
            border-color: rgba(0, 212, 255, 0.4);
            background: linear-gradient(135deg, #1e2445, #161a3a);
        }

        .station-icon {
            width: 50px;
            height: 50px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .station-info {
            flex: 1;
        }

        .station-name {
            color: white;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .station-status {
            color: #00d4ff;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #00d4ff;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }

        .message-badge {
            background: rgba(0, 212, 255, 0.2);
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 11px;
            color: #00d4ff;
        }

        .arrow {
            color: #556080;
            font-size: 20px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #556080;
        }

        .empty-icon {
            font-size: 60px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        /* Bottom Nav */
        .bottom-nav {
            background: rgba(15, 18, 37, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 12px 20px 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-icon {
            font-size: 22px;
        }

        .nav-label {
            font-size: 11px;
            color: #8890b0;
        }

        .nav-item.active .nav-label {
            color: #00d4ff;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <h1>Messages</h1>
            <div class="subtitle">Chat with station owners</div>
        </div>

        <div class="search-bar">
            <input type="text" class="search-input" id="searchInput" placeholder="🔍 Search station...">
        </div>

        <div class="station-list" id="station-container">
            <div class="section-title">ALL STATIONS</div>
            <!-- Stations will appear here -->
        </div>

        <div class="bottom-nav">
            <div class="nav-item" onclick="window.location.href = 'home.html'">
                <div class="nav-icon">🏠</div>
                <div class="nav-label">Home</div>
            </div>
            <div class="nav-item active">
                <div class="nav-icon">💬</div>
                <div class="nav-label">Message</div>
            </div>
            <div class="nav-item" onclick="window.location.href = 'profile.html'">
                <div class="nav-icon">👤</div>
                <div class="nav-label">Profile</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBW1nFDfogr_V3uAsrMPjx1tDULl7URgZQ",
            authDomain: "ea-station.firebaseapp.com",
            databaseURL: "https://ea-station-default-rtdb.firebaseio.com",
            projectId: "ea-station",
            storageBucket: "ea-station.firebasestorage.app",
            messagingSenderId: "493379253444",
            appId: "1:493379253444:web:6319c915469b0359040591",
            measurementId: "G-X670BF4H52"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const stationRef = ref(database, "EA station");
        const stationContainer = document.getElementById("station-container");

        let User = JSON.parse(localStorage.getItem("User"));
        const { uid: UserId} = User;                                
        let allStations = [];

        async function loadStations() {
            const snapsh = await get(stationRef);
            if (snapsh.exists()) {
                const data = snapsh.val();
                const stations = data.stations;
                
                allStations = [];
                for (const stationId in stations) {
                    allStations.push({
                        id: stationId,
                        name: stations[stationId].Information.name,
                        fuelLeft: stations[stationId].Information.fuelLeft || 0
                    });
                }
                renderStations(allStations);
            } else {
                stationContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <div>No stations available</div>
                    </div>
                `;
            }
        }

        function renderStations(stations) {
            if (stations.length === 0) {
                stationContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🔍</div>
                        <div>No stations found</div>
                    </div>
                `;
                return;
            }

            stationContainer.innerHTML = `<div class="section-title">ALL STATIONS</div>`;
            stations.forEach(station => {
                const card = document.createElement("div");
                card.className = "station-card";
                card.innerHTML = `
                    <div class="station-icon">⛽</div>
                    <div class="station-info">
                        <div class="station-name">${station.name}</div>
                        <div class="station-status">
                            <span class="status-dot"></span>
                            ${station.fuelLeft > 0 ? `${station.fuelLeft}L available` : 'Limited fuel'}
                        </div>
                    </div>
                    <div class="message-badge">Message</div>
                    <div class="arrow">→</div>
                `;
                card.addEventListener("click", () => {
                    window.location.href = `chat-detail.html?userId=${UserId}&stationId=${station.id}`;
                });
                stationContainer.appendChild(card);
            });
        }

        // Search functionality
        document.getElementById("searchInput").addEventListener("input", (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filtered = allStations.filter(station => 
                station.name.toLowerCase().includes(searchTerm)
            );
            renderStations(filtered);
        });

        loadStations();
    </script>
</body>
</html>
